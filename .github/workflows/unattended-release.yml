name: unattended-release

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unattended-release
  cancel-in-progress: false

jobs:
  candidate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect upstream
        run: python3 scripts/check_upstream.py

      - name: Build candidate
        run: python3 scripts/build_candidate.py

      - name: Validate candidate
        run: python3 scripts/validate_candidate.py --overlay-ok --tests-ok --scan-missing 0 --scan-control 0

      - name: Promote release
        run: python3 scripts/promote_release.py

      - name: Commit promoted release
        run: |
          if git diff --quiet -- release.json payload/localization/support-policy.json; then
            echo "No supported commit promotion needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release.json payload/localization/support-policy.json
          git commit -m "release: promote supported Hermes commit"
          git push origin HEAD:main

      - name: Collect failure bundle
        if: ${{ failure() }}
        run: python3 scripts/collect_failure_bundle.py

      - name: Upload failure bundle artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: hermes-zh-failure-bundle
          path: out/failure-bundle

      - name: Codex exec remediation
        if: ${{ failure() }}
        run: |
          # codex exec
          bash scripts/run_codex_remediation.sh candidate out || true
