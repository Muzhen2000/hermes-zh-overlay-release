meta:
  usage_label: 用法
  alias_label: 别名
  alias_for_label: /{target} 的别名
commands:
  new: 开始新会话（新的会话 ID 和历史）
  clear: 清屏并开始新会话
  history: 显示对话历史
  save: 保存当前对话
  retry: 重试上一条消息（重新发送给代理）
  undo: 删除上一轮用户/助手对话
  title: 设置当前会话标题
  branch: 从当前会话分支出一条新路径
  compress: 手动压缩当前对话上下文
  rollback: 列出或恢复文件系统检查点
  stop: 终止所有正在运行的后台进程
  approve: 批准待处理的危险命令
  deny: 拒绝待处理的危险命令
  background: 在后台运行一个提示词
  btw: 基于当前会话上下文提一个临时问题（不调用工具，不持久化）
  agents: 显示当前活跃 agent 与运行中的任务
  queue: 将提示词排入下一轮执行（不打断当前运行）
  steer: 在不打断当前运行的情况下，于下一次工具调用后注入一条消息
  status: 显示当前会话信息
  profile: 显示当前 profile 名称和主目录
  sethome: 将当前聊天设为 home channel
  resume: 恢复一个已命名的历史会话
  config: 显示当前配置
  model: 切换当前会话使用的模型
  provider: 显示可用 provider 和当前 provider
  gquota: 显示 Google Gemini Code Assist 配额用量
  personality: 设置预定义人格
  statusbar: 切换上下文/模型状态栏
  verbose: 切换工具进度显示：关闭 -> 新项 -> 全部 -> 详细
  yolo: 切换 YOLO 模式（跳过所有危险命令审批）
  reasoning: 管理推理强度与显示
  fast: 切换快速模式
  skin: 显示或切换界面皮肤/主题
  voice: 切换语音模式
  tools: 管理工具：/tools [list|disable|enable] [name...]
  toolsets: 列出可用工具集
  skills: 搜索、安装、查看或管理技能
  cron: 管理定时任务
  reload-mcp: 从配置重新加载 MCP 服务器
  browser: 通过 CDP 将浏览器工具连接到当前 Chrome
  plugins: 列出已安装插件及其状态
  commands: 分页浏览全部命令和技能
  help: 显示可用命令
  restart: 在等待活动任务排空后优雅重启 gateway
  usage: 显示当前会话的 token 用量与速率限制
  insights: 显示用量洞察与分析
  platforms: 显示 gateway / 消息平台状态
  copy: 将最近一条助手回复复制到剪贴板
  paste: 检查剪贴板中的图片并附加到下一条提示
  image: 为下一条提示附加本地图片文件
  debug: 上传调试报告（系统信息 + 日志）并获取分享链接
  reload: 将 .env 变量重新加载到当前会话
  snapshot: 创建或恢复 Hermes 配置/状态快照
  update: 将 Hermes Agent 更新到最新版本
  quit: 退出 CLI
